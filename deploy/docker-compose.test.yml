# =============================================================================
# TEST/DEMO ONLY — dummy secrets, never use in production.
#
# With these dummy Discord credentials the UI, auth, and listing work.
# Provisioning jobs will be accepted (202) and then fail at Discord —
# supply real DISCORD_* values to provision for real.
#
# Quick start:
#   docker compose -f deploy/docker-compose.test.yml up --build
#   open http://localhost:3000
#
# Mint a key (first time or when you need a new one):
#   docker compose -f deploy/docker-compose.test.yml --profile tools run --rm keygen
# =============================================================================

# Shared environment block — the api and worker share these values.
x-app-env: &app-env
  POSTGRES_DSN: "postgres://hub:hub_test@postgres:5432/discord_support_hub?sslmode=disable"
  VALKEY_ADDR: "valkey:6379"
  LOG_LEVEL: "info"

  # Discord credentials. Defaults are TEST/dummy — with them the UI, auth, and
  # listing work, but provisioning jobs are accepted (202) and then FAIL at
  # Discord. To provision for REAL: copy deploy/.env.demo.example to
  # deploy/.env.demo, fill in your real values, and run compose with
  #   docker compose --env-file deploy/.env.demo -f deploy/docker-compose.test.yml up -d --build
  # (deploy/.env.demo is git-ignored — your bot token never touches git.)
  DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-test-bot-token-not-real}"
  DISCORD_GUILD_ID: "${DISCORD_GUILD_ID:-100000000000000001}"
  DISCORD_AGENT_ROLE_ID: "${DISCORD_AGENT_ROLE_ID:-100000000000000002}"  # must differ from guild id (boot guard)
  DISCORD_CATEGORY_ID: "${DISCORD_CATEGORY_ID:-100000000000000003}"

  # Operator brand: agent nickname suffix (e.g. "- Acme"). Empty = marking off.
  AGENT_NICKNAME_SUFFIX: "${AGENT_NICKNAME_SUFFIX:-}"

  # SMTP relay for the invite email (notify queue). Defaults point at the Mailpit
  # catcher in this stack — no auth, no TLS — so send-invite works out of the box
  # and the email is viewable at http://localhost:8025. Override in deploy/.env.demo
  # to send through a real relay.
  SMTP_HOST: "${SMTP_HOST:-mailpit}"
  SMTP_PORT: "${SMTP_PORT:-1025}"
  SMTP_USERNAME: "${SMTP_USERNAME:-}"
  SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
  SMTP_FROM: "${SMTP_FROM:-support@discord-support-hub.test}"

  # Welcome channel (#bienvenida) — created visible to @everyone with this message.
  WELCOME_CHANNEL_NAME: "${WELCOME_CHANNEL_NAME:-bienvenida}"
  WELCOME_MESSAGE: "${WELCOME_MESSAGE:-Welcome to Support. Your private channel will appear once your role is assigned.}"

  # Disable the reconcile sweep in the test stack (no real Discord to sweep).
  RECONCILE_SWEEP_CRON: ""

services:

  # PostgreSQL 16 — source of truth.
  # Internal only: no host port (avoids conflict with an existing local 5432).
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: discord_support_hub
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub -d discord_support_hub"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Valkey 8 — cache + coordination.
  # Internal only: no host port.
  valkey:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Migration runner — applies schema migrations once and exits.
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: builder
    command: ["/out/migrate"]
    environment:
      POSTGRES_DSN: "postgres://hub:hub_test@postgres:5432/discord_support_hub?sslmode=disable"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # API server — published on 8080 for direct debugging.
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    ports:
      - "8080:8080"
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/livez || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Worker — asynq task processor.
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: worker
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  # Frontend — nginx serving the Vite SPA build; proxies /v1, /livez, /readyz, /metrics to api.
  # Open http://localhost:3000 in your browser.
  frontend:
    build:
      context: ../web/poc
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started

  # Mailpit — SMTP catcher for the invite email. Accepts mail on :1025 (no auth,
  # no TLS); view captured messages at http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  # ── Tools profile ────────────────────────────────────────────────────────────
  # Services in this profile do NOT start on a normal `docker compose up`.
  # Run on demand:
  #   docker compose -f deploy/docker-compose.test.yml --profile tools run --rm keygen

  # keygen — mints a backoffice service API key and prints it once to stdout.
  keygen:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: builder
    command: ["/out/keygen", "--name", "demo-backoffice", "--scope", "backoffice"]
    environment:
      POSTGRES_DSN: "postgres://hub:hub_test@postgres:5432/discord_support_hub?sslmode=disable"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
