openapi: 3.1.0
info:
  title: discord-support-hub API
  version: 0.1.0
  summary: API-driven provisioning and governance of isolated private Discord support spaces.
  description: |
    The control surface (FR-11) for discord-support-hub, consumed by the backoffice
    (no human UI in v1). Postgres is the authorization source of truth; Discord is a
    projection the bot reconciles (three-layer truth model).

    Conventions:
      * **Mutating endpoints are asynchronous.** They validate, persist the *desired*
        state, enqueue a job, and return `202 Accepted` with a `job` handle. Poll
        `GET /jobs/{jobId}` for completion. (NFR-2: latency decoupled from Discord rate limits.)
      * **Read endpoints** are served from cache (TTL + write-invalidation) and return `200`.
      * **Authorization always resolves against Postgres**, never the Discord role (NFR-13).
      * **Idempotency:** mutating requests accept an `Idempotency-Key` header; a repeated key
        replays the original response instead of re-enqueueing (NFR-3).
      * **Role-per-merchant access.** Provisioning a space auto-creates a Discord role for the
        merchant and grants that role VIEW+SEND on the channel. A collaborator acquires access by
        joining through the merchant's native invite-with-role link (created once by the operator
        in the Discord client and stored via `PUT /merchants/{merchantId}/invite`), which the hub
        emails. There are no per-user channel overwrites and no OAuth2 onboarding.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  contact:
    name: discord-support-hub

servers:
  - url: https://hub.example.com/v1
    description: Hub API (v1 base path)

security:
  - ServiceApiKey: []

tags:
  - name: Merchants
    description: Register and list merchants (external customers). Control-plane only.
  - name: Spaces
    description: Provision and manage per-merchant private spaces (channels).
  - name: Collaborators
    description: Manage external collaborator membership of a space.
  - name: Agents
    description: Agent roster management (Admin only).
  - name: Transversal
    description: Directory, audit.
  - name: Jobs
    description: Poll the status of asynchronous mutating operations.

paths:

  # ----------------------------------------------------------------------- #
  # MERCHANTS
  # ----------------------------------------------------------------------- #
  /merchants:
    post:
      tags: [Merchants]
      operationId: registerMerchant
      summary: Register a merchant (synchronous).
      description: |
        Records a new merchant in Postgres - the authorization source of truth - and returns
        `201` with the created `Merchant`. This is a synchronous Postgres write with **no Discord
        side-effect** (a merchant owns a space, but the space is provisioned separately via
        `POST /merchants/{merchantId}/channels`); there is no job to poll.

        The `id` returned here is the merchant UUID used as `{merchantId}` everywhere else in this
        API (provisioning, filters, audit). The backoffice should persist it.

        `external_ref` is the backoffice's own stable identifier and is **unique**: a second
        registration with the same `external_ref` returns `409` (it does not create a duplicate).
        This makes registration safe to retry on the `external_ref` natural key.

        Control-plane authority required (backoffice-scoped service key, NFR-13).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterMerchantRequest'
      responses:
        '201':
          description: Merchant registered. The `id` is the merchant UUID used as `{merchantId}`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Merchant' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: |
            A merchant with this `external_ref` already exists (UNIQUE constraint), or an
            `Idempotency-Key` was reused with a different body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      tags: [Merchants]
      operationId: listMerchants
      summary: List merchants (cursor pagination).
      description: |
        Returns a page of merchants ordered by `created_at` ascending, consistent with the other
        list endpoints (`GET /channels`, `GET /directory`, `GET /audit`). Cursor pagination:
        pass the returned `next_cursor` back as `cursor` to fetch the next page; a `null`
        `next_cursor` means the last page. Control-plane authority required.
      parameters:
        - name: is_active
          in: query
          required: false
          description: When set, filters to active (`true`) or inactive (`false`) merchants.
          schema: { type: boolean }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Page of merchants.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Merchant' }
                  next_cursor: { type: [string, 'null'] }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /merchants/{merchantId}:
    get:
      tags: [Merchants]
      operationId: getMerchant
      summary: Merchant detail by UUID id.
      description: |
        Returns the merchant identified by the UUID `{merchantId}` (the `id` returned by
        `POST /merchants`). Returns `404` with a `{code, message}` body when no merchant has that
        id (including when `{merchantId}` is not a well-formed UUID). Control-plane authority required.
      parameters:
        - $ref: '#/components/parameters/MerchantId'
      responses:
        '200':
          description: Merchant detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Merchant' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /merchants/{merchantId}/invite:
    put:
      tags: [Merchants]
      operationId: setMerchantInvite
      summary: Store the merchant's native invite-with-role link (synchronous).
      description: |
        Stores the **native Discord invite-with-role link** for this merchant. The link binds the
        invite to the merchant's role and is the entry path for every collaborator of this merchant
        (reusable). Because the Discord REST API cannot attach a role to a programmatically-created
        invite, this link is created **by hand once** in the Discord client ("Roles (opcional)"
        dialog) and stored here. The hub emails it on `:send-invite`.

        Synchronous Postgres write (no Discord side-effect); returns `200`. Idempotent: storing the
        same link again is a no-op. Until a link is stored, `:send-invite` for this merchant's
        collaborators returns `409`. Control-plane authority required.
      parameters:
        - $ref: '#/components/parameters/MerchantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite_link]
              properties:
                invite_link:
                  type: string
                  format: uri
                  description: The native Discord invite-with-role URL (e.g. https://discord.gg/...).
      responses:
        '200':
          description: Invite link stored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Merchant' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ----------------------------------------------------------------------- #
  # SPACES
  # ----------------------------------------------------------------------- #
  /merchants/{merchantId}/channels:
    post:
      tags: [Spaces]
      operationId: provisionSpace
      summary: Provision a private space (channel) for a merchant (async).
      description: |
        Records desired state and enqueues a provisioning job. The worker creates the merchant's
        Discord **role** (`GuildRoleCreate`), creates a Discord channel already denied to
        `@everyone` (fail-closed, NFR-4), grants the **merchant role** VIEW+SEND on the channel and
        the Agent role VIEW at the category, and persists `discord_channel_id` + `merchant_role_id`.
        Collaborators later acquire the merchant role by joining through the stored invite-with-role
        link. Returns `202` with a job handle.

        `{merchantId}` is the merchant **UUID `id`** returned by `POST /merchants` (not the
        `external_ref`). The merchant must already exist: register it first with `POST /merchants`.
        When no merchant has this id - or `{merchantId}` is not a well-formed UUID - the response
        is `404` with a clean `{code: "not_found", message}` body, never `500`.
      parameters:
        - $ref: '#/components/parameters/MerchantId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionSpaceRequest'
      responses:
        '202': { $ref: '#/components/responses/JobAccepted' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: |
            No merchant exists with the given `{merchantId}` UUID (register one first via
            `POST /merchants`), or `{merchantId}` is not a well-formed UUID. Body is `{code, message}`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409': { $ref: '#/components/responses/Conflict' }

  /channels:
    get:
      tags: [Spaces]
      operationId: listSpaces
      summary: List all spaces with state, owner, created, last activity (FR-10).
      parameters:
        - name: lifecycle_state
          in: query
          required: false
          schema: { $ref: '#/components/schemas/SpaceLifecycleState' }
        - name: merchant_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Page of spaces.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Space' }
                  next_cursor: { type: [string, 'null'] }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /channels/{id}:
    get:
      tags: [Spaces]
      operationId: getSpace
      summary: Space detail (FR-10).
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      responses:
        '200':
          description: Space detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Space' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /channels/{id}/members:
    get:
      tags: [Spaces]
      operationId: listSpaceMembers
      summary: Users of a space with their role and merchant (FR-17).
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      responses:
        '200':
          description: Members of the space.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/SpaceMember' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /channels/{id}/lifecycle:
    post:
      tags: [Spaces]
      operationId: changeSpaceLifecycle
      summary: Transition space lifecycle - open/resolve/archive/reopen (FR-7, async).
      description: |
        Archiving locks/hides the channel without deleting history. The worker applies the
        Discord-side change; returns `202`.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [open, resolve, archive, reopen]
      responses:
        '202': { $ref: '#/components/responses/JobAccepted' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /channels/{id}/welcome:sync:
    post:
      tags: [Spaces]
      operationId: syncWelcome
      summary: Sync static help-desk presence - topic + pin (FR-15 static, async).
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: Override help-desk message; defaults to merchant/config template.
      responses:
        '202': { $ref: '#/components/responses/JobAccepted' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ----------------------------------------------------------------------- #
  # COLLABORATORS
  # ----------------------------------------------------------------------- #
  /channels/{id}/collaborators:
    post:
      tags: [Collaborators]
      operationId: registerCollaborator
      summary: Register a collaborator on a space by name + work email (synchronous).
      description: |
        Records the desired `space_member` plus the collaborator's **name and work email** (our
        traceability labels, stored in Postgres — never a Discord lookup key). This is a synchronous
        roster write with **no Discord side-effect**: access is role-based and is acquired later when
        the collaborator joins through the merchant's invite-with-role link. Returns `201`.

        Send the invite with `POST /channels/{id}/collaborators/{userId}:send-invite`. Only
        Agents/Admins may register collaborators (FR-20).
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCollaboratorRequest'
      responses:
        '201':
          description: Collaborator registered on the space (invite not yet sent).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SpaceMember' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /channels/{id}/collaborators/{userId}:send-invite:
    post:
      tags: [Collaborators]
      operationId: sendCollaboratorInvite
      summary: Email the merchant's invite-with-role link to a registered collaborator (async).
      description: |
        Enqueues a `notify` job that emails the merchant's stored invite-with-role link (with the
        configurable welcome message) to the collaborator's work email via the hub's SMTP relay.
        Discord does **not** send this email — the hub does. Returns `202`.

        Requires the merchant to have an invite link stored (`PUT /merchants/{merchantId}/invite`);
        if none is stored, returns `409`. Idempotent re-sends are safe (the same link is re-emailed).
        Only Agents/Admins may send (FR-20).
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202': { $ref: '#/components/responses/JobAccepted' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            No invite-with-role link is stored for this space's merchant. Store one first via
            `PUT /merchants/{merchantId}/invite`. Body is `{code, message}`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /channels/{id}/collaborators/{userId}:
    delete:
      tags: [Collaborators]
      operationId: expelCollaborator
      summary: Expel a collaborator from a space (FR-19, async).
      description: |
        `scope=channel` (default) removes the merchant role from the member, keeping the person in
        the guild but dropping access to the merchant's channel. `scope=server` also removes them
        from the guild entirely. Audited either way. Note: because access is role-based, channel-scope
        removal drops access to the merchant's space (one space at the 1:1 cardinality).
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/UserId'
        - name: scope
          in: query
          required: false
          description: Expulsion scope. Default `channel` (least-destructive).
          schema:
            type: string
            enum: [channel, server]
            default: channel
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202': { $ref: '#/components/responses/JobAccepted' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /collaborators/{userId}/channels:
    get:
      tags: [Collaborators]
      operationId: listCollaboratorChannels
      summary: Spaces a collaborator has access to, with merchant, role, state (FR-21).
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Spaces accessible to the collaborator.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/CollaboratorChannel' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ----------------------------------------------------------------------- #
  # AGENTS (Admin only)
  # ----------------------------------------------------------------------- #
  /agents:
    get:
      tags: [Agents]
      operationId: listAgents
      summary: List agents (Admin only) (FR-23).
      responses:
        '200':
          description: Agent roster.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Agent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Agents]
      operationId: addAgent
      summary: Add an agent to the roster (Admin only) (FR-23).
      description: |
        Synchronously records `type=agent` (+ `is_admin`) in Postgres - the authZ source of truth.
        A reconcile job projects the Agent role onto the agent's Discord identity once they are
        present in the guild. Returns `201`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAgentRequest'
      responses:
        '201':
          description: Agent recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /agents/{userId}:
    delete:
      tags: [Agents]
      operationId: removeAgent
      summary: Remove an agent from the roster (Admin only) (FR-23, async).
      description: |
        Marks the agent inactive in Postgres and enqueues a job to remove the Agent role
        (and optionally the guild membership). Returns `202`.
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: scope
          in: query
          required: false
          description: '`role` removes only the Agent role; `server` also removes from the guild.'
          schema:
            type: string
            enum: [role, server]
            default: role
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202': { $ref: '#/components/responses/JobAccepted' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ----------------------------------------------------------------------- #
  # TRANSVERSAL
  # ----------------------------------------------------------------------- #
  /directory:
    get:
      tags: [Transversal]
      operationId: getDirectory
      summary: Global directory - spaces x users x role, bidirectional search (FR-18).
      parameters:
        - name: user_id
          in: query
          required: false
          description: Filter to spaces this user is in ("in what spaces is this user").
          schema: { type: string, format: uuid }
        - name: space_id
          in: query
          required: false
          description: Filter to users in this space ("who is in this space").
          schema: { type: string, format: uuid }
        - name: merchant_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Directory entries (space x user x role).
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/DirectoryEntry' }
                  next_cursor: { type: [string, 'null'] }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /audit:
    get:
      tags: [Transversal]
      operationId: getAudit
      summary: Audit log of provisioning, membership, lifecycle, expulsion (FR-14).
      parameters:
        - name: merchant_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: space_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: action
          in: query
          required: false
          schema: { type: string }
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Audit entries (newest first).
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEntry' }
                  next_cursor: { type: [string, 'null'] }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ----------------------------------------------------------------------- #
  # JOBS (async polling)
  # ----------------------------------------------------------------------- #
  /jobs/{jobId}:
    get:
      tags: [Jobs]
      operationId: getJob
      summary: Poll the status of an asynchronous operation.
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Job status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

components:

  securitySchemes:
    ServiceApiKey:
      type: http
      scheme: bearer
      description: |
        Opaque service API key issued to the backoffice (AuthZ Layer A). Sent as
        `Authorization: Bearer <key>`. Stored hashed at rest; instantly revocable. The future POC
        frontend uses a separate session principal (not this long-lived key) behind the same
        authorization layer.

  parameters:
    MerchantId:
      name: merchantId
      in: path
      required: true
      description: |
        The merchant **UUID `id`** (the `id` returned by `POST /merchants`), NOT the
        backoffice `external_ref`. A value that is not a well-formed UUID, or one that matches
        no merchant, resolves to `404`.
      schema: { type: string, format: uuid }
    SpaceId:
      name: id
      in: path
      required: true
      description: Space (channel) id.
      schema: { type: string, format: uuid }
    UserId:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Client-supplied key making a mutating request idempotent (NFR-3). A repeated key with the
        same body replays the original response; a repeated key with a different body returns 409.
      schema: { type: string, maxLength: 255 }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }

  headers:
    JobLocation:
      description: URL to poll for job completion.
      schema: { type: string, format: uri }

  responses:
    JobAccepted:
      description: |
        Accepted for asynchronous processing. The desired state is persisted; a worker will apply
        the Discord-side change. Poll the returned job for completion.
      headers:
        Location: { $ref: '#/components/headers/JobLocation' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/JobAcceptedBody' }
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid service API key.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not authorized (resolved against Postgres, NFR-13).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Idempotency-Key reused with a different body, or a conflicting state.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:

    RegisterMerchantRequest:
      type: object
      description: Body for POST /merchants. `external_ref` is the backoffice's stable id and is unique.
      required: [external_ref, name]
      properties:
        external_ref:
          type: string
          minLength: 1
          description: |
            Stable identifier from the backoffice. Unique across merchants; a duplicate value
            returns `409`. Lets the backoffice address a merchant idempotently by its own id.
        name:
          type: string
          minLength: 1
          description: Human-readable merchant name.
        help_desk_url:
          type: [string, 'null']
          format: uri
          description: Optional per-merchant help-desk link (FR-15 static parameterization).

    Merchant:
      type: object
      description: |
        An external customer. Owns exactly one space (1:1) and one Discord merchant role (1:1).
        Stores the per-merchant invite-with-role link used to onboard its collaborators.
      required: [id, external_ref, name, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Merchant UUID. This is the `{merchantId}` used elsewhere in the API.
        external_ref:
          type: string
          description: The backoffice's stable id (unique).
        name: { type: string }
        help_desk_url:
          type: [string, 'null']
          format: uri
        invite_link:
          type: [string, 'null']
          format: uri
          description: |
            The merchant's stored native invite-with-role link (set via PUT /merchants/{merchantId}/invite).
            Null until the operator stores it; :send-invite is rejected while null.
        invite_link_set_at:
          type: [string, 'null']
          format: date-time
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    SpaceLifecycleState:
      type: string
      enum: [active, resolved, archived]

    AclState:
      type: string
      description: Fail-closed ACL projection state. Only `applied` is treated as accessible (NFR-4).
      enum: [pending, applied, degraded, failed]

    JobStatus:
      type: string
      enum: [pending, active, completed, retrying, archived]

    UserType:
      type: string
      enum: [agent, collaborator]

    ProvisionSpaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Space name; channel naming may be templated by config (FR-13).
        category_id:
          type: [string, 'null']
          description: Discord category to place the channel under; defaults to configured category.
        welcome_message:
          type: [string, 'null']
          description: Static help-desk message for topic/pin (FR-15 static).

    RegisterCollaboratorRequest:
      type: object
      description: |
        Register a collaborator on a space by **name and work email** — our traceability labels,
        stored in Postgres, never a Discord lookup key. An existing collaborator may be referenced by
        `user_id` instead (e.g. one already registered on another merchant's space). A collaborator is
        a global identity, not bound to a merchant; the merchant scope comes from the target space
        (the path `id`). The same collaborator may be registered on spaces of several merchants.
      properties:
        user_id:
          type: [string, 'null']
          format: uuid
          description: Reference an existing collaborator instead of supplying name+email.
        email:
          type: [string, 'null']
          format: email
          description: The collaborator's work email; the invite link is emailed here.
        name:
          type: [string, 'null']
          description: The collaborator's name (traceability label).
      anyOf:
        - required: [user_id]
        - required: [email, name]

    AddAgentRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        display_name: { type: [string, 'null'] }
        discord_user_id:
          type: [string, 'null']
          description: The agent's Discord id, supplied by the admin; the Agent role is projected onto it.
        is_admin:
          type: boolean
          default: false
          description: Grant the Admin roster-management privilege.

    Space:
      type: object
      required: [id, merchant_id, name, lifecycle_state, acl_state, created_at]
      properties:
        id: { type: string, format: uuid }
        merchant_id: { type: string, format: uuid }
        name: { type: string }
        discord_channel_id:
          type: [string, 'null']
          description: Null until provisioned by the worker.
        discord_category_id: { type: [string, 'null'] }
        merchant_role_id:
          type: [string, 'null']
          description: The merchant's Discord role id (created on provision); grants VIEW+SEND on the channel. Null until provisioned.
        lifecycle_state: { $ref: '#/components/schemas/SpaceLifecycleState' }
        acl_state: { $ref: '#/components/schemas/AclState' }
        last_activity_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }

    SpaceMember:
      type: object
      required: [user_id, role]
      properties:
        user_id: { type: string, format: uuid }
        discord_user_id: { type: [string, 'null'] }
        display_name: { type: [string, 'null'] }
        merchant_id:
          type: [string, 'null']
          format: uuid
          description: The space's merchant (derived from the space, not a property of the collaborator). A collaborator is a global identity and may be a member of spaces across several merchants.
        email:
          type: [string, 'null']
          format: email
          description: The collaborator's work email (our label); the invite link is emailed here.
        role:
          type: string
          enum: [collaborator]
        invite_sent_at:
          type: [string, 'null']
          format: date-time
          description: When the merchant invite-with-role link was emailed to this collaborator (null = not yet sent).
        invited_by: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }

    CollaboratorChannel:
      type: object
      description: One space a collaborator can access. A collaborator may have several of these spanning different merchants; the merchant on each entry is the space's merchant, not the collaborator's.
      required: [space_id, role, lifecycle_state]
      properties:
        space_id: { type: string, format: uuid }
        space_name: { type: string }
        merchant_id:
          type: string
          format: uuid
          description: The space's merchant (derived from the space).
        merchant_name: { type: string }
        role:
          type: string
          enum: [collaborator]
        lifecycle_state: { $ref: '#/components/schemas/SpaceLifecycleState' }

    Agent:
      type: object
      required: [id, type, is_admin]
      properties:
        id: { type: string, format: uuid }
        type:
          type: string
          enum: [agent]
        is_admin: { type: boolean }
        email: { type: [string, 'null'], format: email }
        display_name: { type: [string, 'null'] }
        discord_user_id: { type: [string, 'null'] }
        provisioned_at:
          type: [string, 'null']
          format: date-time
          description: Set once the bot has added them to the guild and projected the Agent role.
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    DirectoryEntry:
      type: object
      description: One space x user x role row. The merchant is the space's merchant (derived from the space); for a collaborator it does not imply the user belongs to that merchant, since a collaborator may appear in spaces of several merchants.
      required: [space_id, user_id, role]
      properties:
        space_id: { type: string, format: uuid }
        space_name: { type: string }
        merchant_id:
          type: string
          format: uuid
          description: The space's merchant (derived from the space).
        merchant_name: { type: string }
        user_id: { type: string, format: uuid }
        user_display_name: { type: [string, 'null'] }
        role: { $ref: '#/components/schemas/UserType' }

    AuditEntry:
      type: object
      required: [id, action, created_at]
      properties:
        id: { type: integer, format: int64 }
        action:
          type: string
          description: e.g. space.provision, merchant.invite_set, collaborator.register, collaborator.invite_sent, collaborator.expel, agent.add, space.archive, reconcile.repair.
        actor_user_id: { type: [string, 'null'], format: uuid }
        merchant_id: { type: [string, 'null'], format: uuid }
        space_id: { type: [string, 'null'], format: uuid }
        target_user_id: { type: [string, 'null'], format: uuid }
        scope:
          type: [string, 'null']
          enum: [channel, server, null]
        detail:
          type: [object, 'null']
          additionalProperties: true
        created_at: { type: string, format: date-time }

    JobAcceptedBody:
      type: object
      required: [job]
      properties:
        job: { $ref: '#/components/schemas/Job' }

    Job:
      type: object
      required: [id, kind, status, created_at]
      properties:
        id: { type: string, format: uuid }
        kind:
          type: string
          description: e.g. provision_space, send_collaborator_invite, expel, project_agent_role, change_lifecycle.
        status: { $ref: '#/components/schemas/JobStatus' }
        space_id: { type: [string, 'null'], format: uuid }
        merchant_id: { type: [string, 'null'], format: uuid }
        user_id: { type: [string, 'null'], format: uuid }
        retry_count: { type: integer }
        error:
          type: [string, 'null']
          description: Last error (redacted) if retrying or archived.
        created_at: { type: string, format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code, e.g. validation_error, forbidden, not_found, idempotency_conflict.
        message: { type: string }
        details:
          type: [object, 'null']
          additionalProperties: true
